<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>UbiSmartCRM Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%2325d366'/%3E%3Ctext x='8' y='12' font-size='10' font-family='sans-serif' text-anchor='middle' fill='white'%3EU%3C/text%3E%3C/svg%3E"/>

    <!--
        ExtJS 4.2 : copiez le dossier "ext" de Prestige
        (prestige/src/main/webapp/general/ext) dans src/main/webapp/ext.
        On réutilise le thème Neptune déjà compilé dans ce SDK.
    -->
    <link rel="stylesheet" href="ext/packages/ext-theme-neptune/build/resources/ext-theme-neptune-all.css"/>
    <link rel="stylesheet" href="app/login.css"/>
    <script src="ext/ext-all.js"></script>

    <style>
        /* Masque les icônes « page » par défaut des nœuds de l'arbre de menu
           (on n'utilise que nos emojis dans le libellé). Supprime aussi le
           cadre d'image cassée affiché par certains navigateurs. */
        .usp-menu .x-tree-icon { display: none !important; }

        /* Animation au survol des cartes du tableau de bord. */
        .usp-card {
            transition: transform .12s ease, box-shadow .12s ease;
        }
        .usp-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,.16) !important;
        }

        /* Bouton de déconnexion : icône rouge seule. */
        .usp-logout { padding: 0 6px !important; }

        /* Avatar rond de l'utilisateur dans le header (#3). */
        .usp-avatar {
            display: inline-block; width: 38px; height: 38px; border-radius: 50%;
            overflow: hidden; vertical-align: middle;
            border: 2px solid rgba(255,255,255,.75);
            background: rgba(255,255,255,.22);
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .usp-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .usp-avatar--empty { background: rgba(255,255,255,.25); }

        /* Badge « à reprendre » (escalade du bot) dans le header. */
        .usp-escalade-badge, .usp-escalade-badge.x-btn-default-small {
            background: #ef6c00 !important; background-image: none !important;
            border: 1px solid #e65100 !important; border-radius: 12px !important;
        }
        .usp-escalade-badge .x-btn-inner {
            color: #fff !important; font-weight: bold;
        }
        @keyframes usp-escalade-pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
        .usp-escalade-badge { animation: usp-escalade-pulse 1.6s ease-in-out infinite; }

        /* ===== Palette ubipharm — header bleu nuit (essai) ===== */
        .usp-header, .usp-header.x-toolbar-default {
            background: #05253d !important;
            background-image: linear-gradient(180deg, #0a3a5e 0%, #05253d 100%) !important;
            border-bottom: 2px solid #031a2c !important;
        }
        .usp-header .x-toolbar-text { color: #ffffff !important; }
        .usp-brand-text {
            color: #fff; font-weight: bold; font-size: 15px; margin-left: 6px;
            letter-spacing: .3px; display: inline-block;
        }
        .usp-logo { display: inline-block; animation: usp-fly 2.4s ease-in-out infinite; }
        @keyframes usp-fly {
            0%   { transform: translate(0, 0) rotate(0deg); }
            50%  { transform: translate(3px, -3px) rotate(-8deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        /* Le branding du header utilise l'animation « vague » lettre par lettre
           (classe .pl-animated-text--brand, cf. app/login.css) appliquée au
           rendu — plus besoin du pulse d'opacité usp-fade. */

        /* ===== Barre latérale (menus) — Option C : teal assorti au header =====
           Pur habillage du treepanel existant : la pastille animée (usp-pace),
           la sélection et les permissions ne sont pas touchées. */
        .usp-menu .x-panel-body,
        .usp-menu .x-grid-view {
            background: linear-gradient(180deg, #12a99e 0%, #0a8f86 60%, #087f77 100%) !important;
            border: 0 !important;
        }
        .usp-menu .x-grid-cell {
            background: transparent !important;
            border-color: transparent !important;
        }
        .usp-menu .x-grid-cell-inner {
            padding-top: 8px !important; padding-bottom: 8px !important;
            transition: padding-left .12s ease;
        }
        .usp-menu .x-tree-node-text {
            color: rgba(255,255,255,.92);
            font-size: 13px;
        }
        /* Menu plat : on supprime l'indentation d'arbre (images « elbow ») pour
           ramener les libellés vers la gauche et éviter la coupe des textes longs. */
        .usp-menu .x-tree-elbow-img { display: none !important; width: 0 !important; }
        /* Survol : voile blanc + léger décalage. */
        .usp-menu .x-grid-row-over .x-grid-cell {
            background: rgba(255,255,255,.14) !important;
        }
        .usp-menu .x-grid-row-over .x-grid-cell-inner { padding-left: 10px; }
        /* Menu actif : carte blanche, texte teal en gras. */
        .usp-menu .x-grid-row-selected .x-grid-cell,
        .usp-menu .x-grid-row-focused .x-grid-cell {
            background: #ffffff !important;
            border-radius: 8px;
        }
        .usp-menu .x-grid-row-selected .x-tree-node-text,
        .usp-menu .x-grid-row-focused .x-tree-node-text {
            color: #0a8f86;
            font-weight: bold;
        }

        /* ===== Fenêtres (Ext.window.Window) : bleu Neptune #3892d3 -> bleu ubipharm #05253d =====
           Cadre + bandeau de titre des fenêtres (notifications, formulaires modaux,
           boîtes de message). Pur habillage : icônes, tuiles et contenus inchangés. */
        .x-window-default {
            border-color: #05253d !important;
            background: #05253d !important;
        }
        .x-window-header-default {
            background: #05253d !important;
            background-image: none !important;
            border-color: #05253d !important;
        }
        .x-window-header-default .x-window-header-text-default,
        .x-window-header-text-default { color: #ffffff !important; }
        .x-window-body-default { border-color: #05253d !important; }

        /* En-têtes de panneaux / grilles aux couleurs ubipharm */
        .x-panel-header-default {
            background: #0a8f86 !important;
            background-image: none !important;
            border-color: #086d66 !important;
        }
        .x-panel-header-text-default, .x-panel-header-default .x-panel-header-text { color: #ffffff !important; }

        /* ===== Onglets « dossier » (Option C) =====
           Pur habillage des classes x-tab : la pastille ✳ animée (usp-pace-tab)
           dans le libellé de l'onglet actif n'est pas touchée. */
        .x-tab-bar-default { background: #d9e2ea !important; background-image: none !important; }
        .x-tab-bar-strip-default { background: #ffffff !important; border-color: #d9e2ea !important; }
        .x-tab-default {
            background: #bfcedb !important; background-image: none !important;
            border: 1px solid #a9bccb !important; border-bottom: 0 !important;
            border-radius: 10px 10px 0 0 !important;
            transition: background .12s ease;
        }
        .x-tab-default .x-tab-inner { color: #3f4e5c !important; font-weight: 600; }
        .x-tab-default.x-tab-over { background: #d6e4ee !important; }
        .x-tab-default.x-tab-over .x-tab-inner { color: #0a8f86 !important; }
        .x-tab-default.x-tab-active {
            background: #ffffff !important;
            box-shadow: 0 -2px 6px rgba(0,0,0,.08);
        }

        /* Bouton principal (créations « ➕ Nouveau… ») : dégradé teal bien visible. */
        .usp-btn-pri, .usp-btn-pri.x-btn-default-small, .usp-btn-pri.x-btn-default-toolbar-small {
            background: #0a8f86 !important;
            background-image: linear-gradient(135deg, #12a99e, #0a8f86) !important;
            border-color: #087f77 !important;
        }
        .usp-btn-pri .x-btn-inner { color: #ffffff !important; font-weight: bold; }
        .usp-btn-pri.x-btn-over { background-image: linear-gradient(135deg, #16bcb0, #0c9c92) !important; }
        /* Onglet actif aux couleurs ubipharm */
        .x-tab-active .x-tab-inner { color: #0a8f86 !important; font-weight: bold; }

        /* Grilles : en-têtes de colonnes clairs + survol des lignes teinté teal léger
           (le menu latéral garde son propre style, plus spécifique). */
        .x-column-header, .x-column-header-default {
            background: #f7f9fb !important; background-image: none !important;
            border-bottom: 2px solid #e4e9ef !important;
        }
        .x-column-header-inner .x-column-header-text { color: #5a6573; font-weight: 600; }
        .x-grid-row-over .x-grid-cell { background: #f2f7f6 !important; }
    </style>

    <script src="app/app.js"></script>
    <script src="app/importer.js"></script>
    <script src="app/inbox.js"></script>
    <script src="app/campaign.js"></script>
    <script src="app/catalogue.js"></script>
    <script src="app/marketing.js"></script>
    <script src="app/dispo.js"></script>
    <script src="app/info.js"></script>
    <script src="app/crm.js"></script>
    <script src="app/settings.js"></script>
    <script src="app/users.js"></script>
    <script src="app/waweb.js"></script>
    <script src="app/history.js"></script>
    <script src="app/recouvrement.js"></script>
</head>
<body>
    <!-- Diagnostic : message lisible si le SDK Ext JS n'est pas trouvé (au lieu d'une page blanche). -->
    <script>
        window.addEventListener('load', function () {
            if (typeof Ext === 'undefined') {
                document.body.innerHTML =
                    '<div style="font-family:sans-serif;max-width:640px;margin:60px auto;padding:24px;' +
                    'border:1px solid #e0b4b4;background:#fff6f6;border-radius:8px;color:#912d2b">' +
                    '<h2>Ext JS 4.2 introuvable</h2>' +
                    '<p>Le backend fonctionne, mais l\'interface ne peut pas se charger car le SDK ' +
                    '<b>Ext JS 4.2</b> est absent.</p>' +
                    '<p>Copiez le dossier <code>ext</code> de Prestige ' +
                    '(<code>prestige/src/main/webapp/general/ext</code>) dans ' +
                    '<code>src/main/webapp/ext</code>, puis reconstruisez le WAR. ' +
                    'Fichiers attendus :</p>' +
                    '<pre>ext/ext-all.js\next/packages/ext-theme-neptune/build/resources/ext-theme-neptune-all.css</pre>' +
                    '<p>L\'API REST reste accessible sous <code>/ubisenderpro/api/v1/</code>.</p>' +
                    '</div>';
            }
        });
    </script>
</body>
</html>
