# Intégration continue : exécute la suite de tests Maven sur chaque pull request
# et sur chaque push vers master (non-régression automatique).
name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  tests:
    name: Tests unitaires (mvn test)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: JDK 11 (Temurin) + cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      # « verify » enchaîne les tests unitaires (surefire) puis les tests
      # d'intégration Testcontainers (*IT, failsafe) — Docker est fourni
      # par les runners GitHub.
      - name: Compilation + tests unitaires et d'intégration
        run: mvn -B --no-transfer-progress verify

      - name: Rapports de tests (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-de-tests
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7
